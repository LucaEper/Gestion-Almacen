// ═══ PDF/Informe HTML generation ═══
function makeInformeHtml(s) {
  const photos = Object.entries(s.photos).map(([k,url])=>'<div style="break-inside:avoid;margin-bottom:8px"><img src="'+url+'" style="width:100%;max-height:220px;object-fit:contain;border:1px solid #ddd;border-radius:6px"/><p style="font-size:10px;color:#666;margin:4px 0 0;text-align:center">'+(s.photoLabels[k]||k)+'</p></div>').join("");
  const tipo = s.tipoProceso==="empaquetamiento"?"Empaquetamiento":"Transporte";
  const modo = s.modoBulto==="nuevo"?"Bulto nuevo":"Ampliación de información";
  return '<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Informe '+s.codigoInterno+' - '+s.bultoName+'</title><style>@page{size:A4;margin:20mm}body{font-family:Segoe UI,system-ui,sans-serif;color:#1a1a2e;margin:0;font-size:13px;line-height:1.5}.hd{background:linear-gradient(135deg,#f59e0b,#b45309);color:#fff;padding:24px 28px;border-radius:0 0 12px 12px}.hd h1{margin:0;font-size:22px;font-weight:800}.hd p{margin:6px 0 0;font-size:13px;opacity:.85}.bdg{display:inline-block;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:8px;margin-right:6px}.ct{padding:24px 28px}.sc{margin-bottom:20px}.st{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;font-weight:700;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid #f3f4f6}table{width:100%;border-collapse:collapse}td{padding:8px 12px;border-bottom:1px solid #f3f4f6;vertical-align:top}td:first-child{font-weight:600;color:#6b7280;width:160px;font-size:12px;text-transform:uppercase;letter-spacing:.03em}.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fp{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-family:Courier New,monospace;font-size:12px;color:#475569}.ft{text-align:center;padding:20px;font-size:10px;color:#9ca3af;border-top:1px solid #f3f4f6;margin-top:20px}.mb{background:#fef3c7;border:2px solid #f59e0b;border-radius:8px;padding:6px 16px;display:inline-block;font-family:Courier New,monospace;font-size:18px;font-weight:800;letter-spacing:.1em;color:#92400e}.print-btn{display:block;margin:20px auto;padding:12px 32px;background:#f59e0b;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}@media print{.print-btn{display:none!important}}</style></head><body><div class="hd"><h1>Informe de '+tipo+'</h1><p>'+s.codigoInterno+' — '+s.bultoName+' — '+s.fecha+' '+s.hora+'</p><span class="bdg">'+modo+'</span><span class="bdg">'+s.opciones.join(" · ")+'</span></div><div class="ct"><div class="sc"><div class="st">Datos del registro</div><table><tr><td>Código interno</td><td><strong style="font-size:15px;color:#b45309">'+s.codigoInterno+'</strong></td></tr><tr><td>Proceso</td><td>'+tipo+'</td></tr><tr><td>Bulto</td><td><strong>'+s.bultoName+'</strong> ('+modo+')</td></tr><tr><td>Opciones</td><td>'+s.opciones.join(", ")+'</td></tr><tr><td>Operario</td><td>'+s.usuario+'</td></tr><tr><td>Transportista</td><td>'+s.transportista+'</td></tr>'+(s.matricula?'<tr><td>Matrícula</td><td><div class="mb">'+s.matricula+'</div></td></tr>':'')+'<tr><td>Fecha</td><td>'+s.fecha+'</td></tr><tr><td>Hora</td><td>'+s.hora+'</td></tr><tr><td>Nº de fotos</td><td>'+Object.keys(s.photos).length+'</td></tr></table></div><div class="sc"><div class="st">Estructura de archivos</div><div class="fp">'+s.folderPath+'</div></div><div class="sc"><div class="st">Fotos capturadas ('+Object.keys(s.photos).length+')</div><div class="pg">'+photos+'</div></div></div><button class="print-btn" onclick="window.print()">Imprimir / Guardar como PDF</button><div class="ft">Documento generado — Gestión Almacén v1.0<br/>'+s.fecha+' '+s.hora+' — '+s.usuario+'</div></body></html>';
}

// ═══ Enviar a SharePoint via webhook ═══
async function enviarASharePoint(session) {
  const fotos = Object.entries(session.photos).map(([key, dataUrl]) => ({
    nombre: (session.photoLabels[key] || key).replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ ._-]/g, "") + ".jpg",
    contenido: dataUrl
  }));

  const informe = makeInformeHtml(session);
  const cleanPath = session.folderPath.replace(/📁\s*/g,"").replace(/^\s*\//, "").replace(/\/\s*$/, "").trim();

  const payload = {
    codigoInterno: session.codigoInterno,
    tipoProceso: session.tipoProceso,
    bultoName: session.bultoName,
    modoBulto: session.modoBulto,
    opciones: session.opciones.join(", "),
    usuario: session.usuario,
    transportista: session.transportista,
    matricula: session.matricula,
    fecha: session.fecha,
    hora: session.hora,
    folderPath: cleanPath,
    numFotos: fotos.length,
    informe: informe,
    fotos: fotos
  };

  const response = await fetch(WEBHOOK_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload),
    redirect: "follow"
  });

  // Con mode: no-cors no podemos leer la respuesta,
  // pero si no hubo error de red, los datos se enviaron
  return { status: "ok" };
}

function descargarInforme(s) {
  const html = makeInformeHtml(s);
  const fileName = "Informe_" + s.codigoInterno + "_" + s.bultoName + "_" + s.fecha + ".html";
  if (navigator.share && navigator.canShare) {
    const file = new File([html], fileName, { type: "text/html" });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({ title: "Informe " + s.codigoInterno, files: [file] }).catch(() => dlFallback(html, fileName));
      return;
    }
  }
  dlFallback(html, fileName);
}
function dlFallback(html, fn) {
  const b = new Blob([html],{type:"text/html"}); const u = URL.createObjectURL(b);
  const a = document.createElement("a"); a.href=u; a.download=fn; a.style.display="none";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},200);
}

function App() {
  const [step, setStep] = useState("login");
  const [usuario, setUsuario] = useState("");
  const [codigoInterno, setCodigoInterno] = useState("");
  const [tipoProceso, setTipoProceso] = useState("");
  const [modoBulto, setModoBulto] = useState("");
  const [selectedBulto, setSelectedBulto] = useState(null);
  const [opciones, setOpciones] = useState([]);
  const [bultoCount, setBultoCount] = useState(1);
  const [transportista, setTransportista] = useState("");
  const [matricula, setMatricula] = useState("");
  const [photoQueue, setPhotoQueue] = useState([]);
  const [currentPhotoIndex, setCurrentPhotoIndex] = useState(0);
  const [capturedPhotos, setCapturedPhotos] = useState({});
  const [photoLabels, setPhotoLabels] = useState({});
  const [completedSessions, setCompletedSessions] = useState([]);
  const [animateIn, setAnimateIn] = useState(true);
  const [bultoRegistry, setBultoRegistry] = useState({});
  const [uploadStatus, setUploadStatus] = useState("idle"); // idle | uploading | ok | error
  const [uploadMsg, setUploadMsg] = useState("");
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const canvasRef = useRef(null);

  const anim = (next) => {setAnimateIn(false);setTimeout(()=>{setStep(next);setAnimateIn(true);},200);};
  const registryKey = codigoInterno+"_"+tipoProceso;
  const currentBultos = bultoRegistry[registryKey]||[];

  const createNewBulto = () => {
    const num = currentBultos.length+1; const now = new Date();
    const bulto = {id:generateId(),number:num,name:"Bulto-"+pad3(num),date:formatDate(now),records:[]};
    setBultoRegistry(p=>({...p,[registryKey]:[...(p[registryKey]||[]),bulto]}));
    setSelectedBulto(bulto); setModoBulto("nuevo"); anim("opciones");
  };
  const selectBultoForAmpliar = (bulto) => {setSelectedBulto(bulto);setModoBulto("ampliar");anim("opciones");};

  const buildQueue = useCallback(() => {
    const q = [];
    opciones.forEach((opt) => {
      if(opt==="multiple"){for(let i=1;i<=bultoCount;i++) q.push({key:"multiple_"+i,label:"Foto bulto #"+i,option:"multiple"});}
      else{PHOTO_REQUIREMENTS[opt].photos.forEach((l,i)=>q.push({key:opt+"_"+i,label:l,option:opt}));}
    }); return q;
  }, [opciones, bultoCount]);

  const startCam = async () => { try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1920},height:{ideal:1080}}});streamRef.current=s;if(videoRef.current)videoRef.current.srcObject=s;}catch{alert("No se pudo acceder a la cámara.");} };
  const stopCam = () => {if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}};
  const snap = () => {if(!videoRef.current||!canvasRef.current)return null;const v=videoRef.current,c=canvasRef.current;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);return c.toDataURL("image/jpeg",0.85);};
  const handleSnap = () => {const photo=snap();if(!photo)return;const item=photoQueue[currentPhotoIndex];setCapturedPhotos(p=>({...p,[item.key]:photo}));setPhotoLabels(p=>({...p,[item.key]:item.label}));if(currentPhotoIndex<photoQueue.length-1)setCurrentPhotoIndex(i=>i+1);else{stopCam();anim("transportista");}};
  const retake = () => {const item=photoQueue[currentPhotoIndex];setCapturedPhotos(p=>{const n={...p};delete n[item.key];return n;});};

  useEffect(()=>{if(step==="camera"){const q=buildQueue();setPhotoQueue(q);setCurrentPhotoIndex(0);setCapturedPhotos({});setPhotoLabels({});startCam();}return()=>{if(step==="camera")stopCam();};},[step]);

  const finalize = async () => {
    const now=new Date();const tipo=tipoProceso==="empaquetamiento"?"Empaquetamiento":"Transporte";
    const bultoName=selectedBulto?selectedBulto.name:"Bulto-001";
    const recordNum=selectedBulto?(currentBultos.find(b=>b.id===selectedBulto.id)?.records?.length||0)+1:1;
    const session = {id:generateId(),codigoInterno,tipoProceso,modoBulto,bultoName,bultoId:selectedBulto?.id,opciones:opciones.map(o=>PHOTO_REQUIREMENTS[o].label),fecha:formatDate(now),hora:formatTime(now),horaShort:formatTimeShort(now),usuario,transportista,matricula:matricula.toUpperCase(),photos:{...capturedPhotos},photoLabels:{...photoLabels},folderPath:codigoInterno+"/"+tipo+"/"+bultoName+"/"+(modoBulto==="ampliar"?"Registro-"+pad3(recordNum)+"_":"")+formatDate(now)+"_"+formatTimeShort(now)};

    if(selectedBulto){setBultoRegistry(prev=>{const key=registryKey;const bultos=[...(prev[key]||[])];const idx=bultos.findIndex(b=>b.id===selectedBulto.id);if(idx>=0)bultos[idx]={...bultos[idx],records:[...bultos[idx].records,session]};return{...prev,[key]:bultos};});}
    setCompletedSessions(p=>[session,...p]);
    
    // Subir a SharePoint
    setUploadStatus("uploading");
    setUploadMsg("Subiendo a SharePoint...");
    anim("summary");

    try {
      await enviarASharePoint(session);
      setUploadStatus("ok");
      setUploadMsg("Subido a SharePoint correctamente");
    } catch (err) {
      setUploadStatus("error");
      setUploadMsg("Error al subir: " + err.message);
    }
  };

  const retryUpload = async () => {
    const s = completedSessions[0];
    if (!s) return;
    setUploadStatus("uploading");
    setUploadMsg("Reintentando...");
    try {
      await enviarASharePoint(s);
      setUploadStatus("ok");
      setUploadMsg("Subido a SharePoint correctamente");
    } catch (err) {
      setUploadStatus("error");
      setUploadMsg("Error al subir: " + err.message);
    }
  };

  const resetAll = () => {setCodigoInterno("");setTipoProceso("");setModoBulto("");setSelectedBulto(null);setOpciones([]);setBultoCount(1);setTransportista("");setMatricula("");setPhotoQueue([]);setCurrentPhotoIndex(0);setCapturedPhotos({});setPhotoLabels({});setUploadStatus("idle");setUploadMsg("");anim("codigo");};
  const resetToGestion = () => {setModoBulto("");setSelectedBulto(null);setOpciones([]);setBultoCount(1);setTransportista("");setMatricula("");setPhotoQueue([]);setCurrentPhotoIndex(0);setCapturedPhotos({});setPhotoLabels({});setUploadStatus("idle");setUploadMsg("");anim("gestion");};
  const toggleOpt = (opt) => {setOpciones(p=>p.includes(opt)?p.filter(o=>o!==opt):[...p,opt]);};

  // ═══ REVIEW ═══
  if(step==="review"){const now=new Date();const tipo=tipoProceso==="empaquetamiento"?"Empaquetamiento":"Transporte";const bultoName=selectedBulto?selectedBulto.name:"Bulto-001";const modoTxt=modoBulto==="nuevo"?"Bulto nuevo":"Ampliación";const recordNum=(selectedBulto?(currentBultos.find(b=>b.id===selectedBulto.id)?.records?.length||0)+1:1);const rows=[["Código",codigoInterno],["Proceso",tipo],["Bulto",bultoName+" ("+modoTxt+")"],["Opciones",opciones.map(o=>PHOTO_REQUIREMENTS[o].label).join(", ")],["Fotos",Object.keys(capturedPhotos).length+" capturadas"],["Usuario",usuario],["Transportista",transportista]];if(matricula)rows.push(["Matrícula",matricula]);rows.push(["Fecha",formatDate(now)],["Hora",formatTime(now)]);return(<div style={wrap}>{hdr("Revisión final",()=>anim("transportista"))}{stps(5,6)}<div style={{flex:1,padding:"24px 20px",paddingBottom:"120px"}}><div style={{background:C.surfaceLight,borderRadius:"14px",border:"1px solid "+C.border,overflow:"hidden"}}>{rows.map(([l,v],i)=><div key={i} style={{padding:"12px 16px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><span style={{fontSize:"13px",color:C.textMuted,minWidth:"90px"}}>{l}</span><span style={{fontSize:"13px",color:l==="Matrícula"?C.accentLight:l==="Bulto"?C.info:C.text,textAlign:"right",flex:1,marginLeft:"12px",fontFamily:(l==="Matrícula"||l==="Código")?mono:"inherit",fontWeight:(l==="Matrícula"||l==="Código"||l==="Bulto")?700:400}}>{v}</span></div>)}</div><div style={{marginTop:"16px"}}><p style={{fontSize:"12px",color:C.textDim,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"10px"}}>Fotos capturadas</p><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}}>{photoQueue.map(item=><div key={item.key} style={{position:"relative",borderRadius:"8px",overflow:"hidden",aspectRatio:"4/3",background:C.surface,border:"1px solid "+C.border}}>{capturedPhotos[item.key]?<img src={capturedPhotos[item.key]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:C.textDim}}><IconImage/></div>}<div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.8))",padding:"4px 6px",fontSize:"9px",color:"rgba(255,255,255,.8)"}}>{item.label}</div></div>)}</div></div></div><div style={{position:"fixed",bottom:0,left:0,right:0,padding:"16px 20px",background:"linear-gradient(to top,"+C.bg+","+C.bg+"ee,transparent)"}}><button onClick={finalize} style={{...bb,width:"100%",padding:"16px",background:"linear-gradient(135deg,"+C.success+",#059669)",color:"#fff",fontSize:"16px",fontWeight:700,borderRadius:"12px",boxShadow:"0 4px 20px "+C.success+"44"}}><IconCloud/> Confirmar y subir a SharePoint</button></div></div>);}

  // ═══ SUMMARY ═══
  if(step==="summary"){const s=completedSessions[0];if(!s)return null;const modoTxt=s.modoBulto==="nuevo"?"Bulto nuevo creado":"Información ampliada";return(<div style={wrap}>{hdr("Registro completado",null)}<div style={{flex:1,padding:"24px 20px"}}>

  {/* Upload status banner */}
  <UploadBanner/>

  <div style={{textAlign:"center",marginBottom:"28px"}}><div style={{width:"80px",height:"80px",borderRadius:"50%",background:uploadStatus==="ok"?C.success+"15":uploadStatus==="error"?C.danger+"15":C.info+"15",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",border:"3px solid "+(uploadStatus==="ok"?C.success:uploadStatus==="error"?C.danger:C.info)}}>{uploadStatus==="uploading"?<IconSpinner/>:uploadStatus==="ok"?<svg width="40" height="40" fill="none" stroke={C.success} strokeWidth="2.5" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>:uploadStatus==="error"?<div style={{color:C.danger}}><IconAlert/></div>:<IconSpinner/>}</div><h2 style={{margin:"0 0 4px",fontSize:"20px",fontWeight:800}}>{uploadStatus==="ok"?"Guardado en SharePoint":uploadStatus==="error"?"Error al subir":"Subiendo..."}</h2><p style={{margin:0,color:C.textMuted,fontSize:"14px"}}>{s.codigoInterno} — {s.bultoName}</p><div style={{marginTop:"8px",display:"inline-block",padding:"4px 12px",borderRadius:"20px",fontSize:"12px",fontWeight:600,background:s.modoBulto==="nuevo"?C.accent+"20":C.info+"20",color:s.modoBulto==="nuevo"?C.accentLight:C.info}}>{modoTxt}</div></div>

  <div style={{background:C.surfaceLight,borderRadius:"14px",border:"1px solid "+C.border,padding:"16px"}}><div style={{fontSize:"11px",color:C.textDim,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"12px"}}>Datos del registro</div><div style={{fontFamily:mono,fontSize:"12px",lineHeight:2,color:C.textMuted}}><div><span style={{color:C.textDim}}>código:</span> <span style={{color:C.accentLight}}>{s.codigoInterno}</span></div><div><span style={{color:C.textDim}}>bulto:</span> <span style={{color:C.info,fontWeight:700}}>{s.bultoName}</span></div><div><span style={{color:C.textDim}}>proceso:</span> <span style={{color:C.text}}>{s.tipoProceso}</span></div><div><span style={{color:C.textDim}}>opciones:</span> <span style={{color:C.text}}>{s.opciones.join(", ")}</span></div><div><span style={{color:C.textDim}}>fotos:</span> <span style={{color:C.text}}>{Object.keys(s.photos).length}</span></div><div><span style={{color:C.textDim}}>usuario:</span> <span style={{color:C.text}}>{s.usuario}</span></div><div><span style={{color:C.textDim}}>transportista:</span> <span style={{color:C.text}}>{s.transportista}</span></div>{s.matricula&&<div><span style={{color:C.textDim}}>matrícula:</span> <span style={{color:C.accentLight,fontWeight:700,letterSpacing:"0.08em"}}>{s.matricula}</span></div>}<div><span style={{color:C.textDim}}>fecha:</span> <span style={{color:C.text}}>{s.fecha} {s.hora}</span></div></div></div>

  <div style={{marginTop:"16px",padding:"14px 16px",background:C.surfaceLight,borderRadius:"10px",border:"1px solid "+C.border}}><div style={{fontSize:"11px",color:C.textDim,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"6px"}}>Ruta en SharePoint</div><div style={{fontFamily:mono,fontSize:"11px",color:C.accentLight,wordBreak:"break-all"}}>{s.folderPath}</div></div>

  <button onClick={()=>descargarInforme(s)} style={{...bb,width:"100%",marginTop:"20px",padding:"14px",background:C.danger+"15",border:"2px solid "+C.danger+"40",color:C.danger,fontSize:"15px",borderRadius:"12px"}}><IconDownload/> Descargar copia local</button>
  <button onClick={resetToGestion} style={{...bb,width:"100%",marginTop:"12px",padding:"14px",background:C.info+"15",border:"2px solid "+C.info+"40",color:C.info,fontSize:"15px",borderRadius:"12px"}}><IconFolder/> Seguir con {s.codigoInterno}</button>
  <button onClick={resetAll} style={{...bb,width:"100%",marginTop:"10px",padding:"16px",background:"linear-gradient(135deg,"+C.accent+","+C.accentDark+")",color:"#000",fontSize:"16px",fontWeight:700,borderRadius:"12px"}}><IconRefresh/> Nuevo pedido</button>
  </div></div>);}

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
